<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BackLogger — Archive</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body { overflow: auto; }
  .archive-container { padding: 20px; max-width: 1100px; margin: 0 auto; }
  .archive-tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .archive-tabs button { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 13px; }
  .archive-tabs button.active { background: var(--accent); border-color: var(--accent); }
  .archive-table { width: 100%; border-collapse: collapse; }
  .archive-table th { text-align: left; padding: 10px 12px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
  .archive-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .archive-table tr:hover td { background: var(--surface2); }
  .archive-task-title { font-weight: 500; }
  .archive-date { color: var(--muted); font-size: 12px; }
  .summary-row { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
  .summary-row-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .summary-row-content { font-size: 13px; color: var(--text); line-height: 1.5; white-space: pre-wrap; }
  .summary-row-meta { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .empty-archive { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>BackLogger</h1>
  <span class="status" id="statusDot">⏳ loading...</span>
  <div class="spacer"></div>
  <div style="display:flex;gap:4px">
    <a href="index.html" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:13px;text-decoration:none;display:flex;align-items:center">← Board</a>
    <button class="active">🗄 Archive</button>
  </div>
</div>

<div class="archive-container">
  <div class="archive-tabs">
    <button class="active" id="tabTasks" onclick="switchArchiveTab('tasks')">Archived Tasks</button>
    <button id="tabSummaries" onclick="switchArchiveTab('summaries')">Past Summaries</button>
  </div>

  <div id="archiveTasksView"></div>
  <div id="archiveSummariesView" style="display:none"></div>
</div>

<script>
const SB_URL = 'https://ocjuxlfysrafnxfwsehr.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9janV4bGZ5c3JhZm54ZndzZWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NzAzMDYsImV4cCI6MjA5NDM0NjMwNn0.pOFOoGIaOsAGOxPrwn8FM_mco3euP4Mhen9_4F9ZPis';

let archivedTasks = [], pastSummaries = [];

async function sbRead(table, query) {
  query = query || 'select=*';
  try {
    const res = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Accept': 'application/json' }
    });
    if (!res.ok) throw new Error(`${res.status}`);
    return await res.json();
  } catch(e) { console.error('sbRead error', e); return null; }
}

function setStatus(txt, color) {
  document.getElementById('statusDot').textContent = txt;
  document.getElementById('statusDot').style.color = color;
}

async function loadArchive() {
  setStatus('⏳ loading...', 'var(--muted)');
  const [tasks, sums] = await Promise.all([
    sbRead('tasks', 'select=*&status=eq.archived&order=archived_at.desc&limit=50'),
    sbRead('summaries', 'select=*&status=in.(read,archived)&order=created_at.desc&limit=50')
  ]);
  if (tasks) archivedTasks = tasks;
  if (sums) pastSummaries = sums;
  setStatus('● live', 'var(--green)');
  renderArchivedTasks();
  renderPastSummaries();
}

function renderArchivedTasks() {
  const el = document.getElementById('archiveTasksView');
  if (!archivedTasks.length) {
    el.innerHTML = '<div class="empty-archive">No archived tasks yet. Tasks in Done for 7+ days are auto-archived.</div>';
    return;
  }
  let html = '<table class="archive-table"><thead><tr><th>Task</th><th>Category</th><th>Priority</th><th>Created</th><th>Archived</th></tr></thead><tbody>';
  archivedTasks.forEach(t => {
    const created = t.created_at ? new Date(t.created_at).toLocaleDateString('en-ZA', {day:'numeric',month:'short',year:'numeric'}) : '';
    const archived = t.archived_at ? new Date(t.archived_at).toLocaleDateString('en-ZA', {day:'numeric',month:'short',year:'numeric'}) : '';
    html += `<tr>
      <td class="archive-task-title">${escHtml(t.title)}</td>
      <td><span class="badge badge-cat">${t.category||''}</span></td>
      <td><span class="badge badge-priority-${t.priority}">${t.priority||''}</span></td>
      <td class="archive-date">${created}</td>
      <td class="archive-date">${archived}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderPastSummaries() {
  const el = document.getElementById('archiveSummariesView');
  if (!pastSummaries.length) {
    el.innerHTML = '<div class="empty-archive">No past summaries yet.</div>';
    return;
  }
  el.innerHTML = pastSummaries.map(s => {
    const date = s.created_at ? new Date(s.created_at).toLocaleString('en-ZA', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="summary-row">
      <div class="summary-row-header">
        <span class="badge badge-scan">${escHtml(s.scan_type || 'scan')}</span>
        <span class="archive-date">${date}</span>
        ${s.tasks_added ? `<span style="font-size:11px;color:var(--green);font-weight:600">+${s.tasks_added} tasks</span>` : ''}
      </div>
      <div class="summary-row-content">${escHtml(s.content || '')}</div>
    </div>`;
  }).join('');
}

function switchArchiveTab(tab) {
  document.getElementById('archiveTasksView').style.display = tab === 'tasks' ? 'block' : 'none';
  document.getElementById('archiveSummariesView').style.display = tab === 'summaries' ? 'block' : 'none';
  document.getElementById('tabTasks').classList.toggle('active', tab === 'tasks');
  document.getElementById('tabSummaries').classList.toggle('active', tab === 'summaries');
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

loadArchive();
</script>
</body>
</html>
